name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/cd_docker_project:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            PROJECT_DIR=/opt/cd_docker_project
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            cat > docker-compose.yml <<'EOF'
            services:
              web:
                image: ${IMAGE_NAME}
                container_name: cd_docker_project_web
                ports:
                  - "${APP_PORT}:5000"
                restart: always
            EOF

            echo "IMAGE_NAME=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/cd_docker_project:latest" > .env
            echo "APP_PORT=${{ secrets.APP_PORT }}" >> .env

            IMAGE_NAME="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/cd_docker_project:latest"

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker pull "$IMAGE_NAME"

            docker compose down || true
            docker compose up -d
            docker compose ps
